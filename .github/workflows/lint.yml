name: Lint

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-none-format:
    name: NoneType 포매팅 린터
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run lint_none_format
        env:
          PYTHONUTF8: "1"
        run: |
          python scripts/lint_none_format.py

      - name: Report lint summary
        if: always()
        run: |
          echo "린트 규칙: R1/R2 (ERROR), R3 (WARN)"
          echo "설계 문서: docs/lint_layer.md"

  unit-tests:
    name: 공용 헬퍼 단위 테스트
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run tests
        env:
          PYTHONUTF8: "1"
        run: |
          python -m unittest discover -s tests -v

  pre-deploy-check:
    name: 배포 전 검증 (pre_deploy_check)
    runs-on: ubuntu-latest
    needs: [lint-none-format, unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run pre_deploy_check
        env:
          PYTHONUTF8: "1"
        run: |
          python scripts/pre_deploy_check.py
